<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bigger Box</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
    padding: 0;
  }

  .page-wrap {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Chat ── */

  .chat-container {
    width: 100%;
    height: 75vh;
    min-height: 480px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .chat-header {
    padding: 18px 24px;
    border-bottom: 1px solid #eeede9;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    flex-shrink: 0;
  }

  .chat-header-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #f5a623, #e8761a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .chat-header-text h2 {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .chat-header-text p {
    font-size: 12px;
    color: #888;
    margin-top: 1px;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user      { align-self: flex-end;   align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    color: #1a1a1a;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .message-bubble {
    background: #1a1a1a;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .message-bubble {
    background: #f5f5f3;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
    background: #f5f5f3;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: #aaa;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%            { transform: translateY(-5px); }
  }

  .chat-input-area {
    padding: 14px 18px;
    border-top: 1px solid #eeede9;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fff;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e0dfd9;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fafaf8;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: #1a1a1a; background: #fff; }
  .chat-input::placeholder { color: #bbb; }

  .send-button {
    width: 42px;
    height: 42px;
    background: #1a1a1a;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-button:hover  { background: #333; }
  .send-button:active { transform: scale(0.95); }
  .send-button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .send-button svg { width: 18px; height: 18px; fill: #fff; }

  .error-message {
    align-self: center;
    font-size: 12px;
    color: #c0392b;
    background: #fdf0ef;
    padding: 8px 14px;
    border-radius: 8px;
  }

  .welcome-message {
    align-self: center;
    text-align: center;
    color: #999;
    font-size: 13px;
    padding: 24px 0 8px;
    max-width: 380px;
  }

  .welcome-message strong {
    display: block;
    color: #444;
    font-size: 15px;
    margin-bottom: 8px;
  }

  /* ── Feedback & Topic panels ── */

  .panels-bar {
    display: none;
    position: absolute;
    bottom: 71px; /* sits just above the input area */
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(4px);
    border-top: 1px solid #eeede9;
    box-shadow: 0 -6px 20px rgba(0,0,0,0.08);
    z-index: 10;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .panels-bar.visible { display: flex; }

  .panels-dismiss {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 18px;
    color: #bbb;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
  }
  .panels-dismiss:hover { color: #666; }

  .panel {
    flex: 1;
    padding: 14px 20px;
  }

  .panel + .panel {
    border-left: 1px solid #eeede9;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 14px;
  }

  /* Stars */
  .star-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .star {
    font-size: 28px;
    color: #e0dfd9;
    cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }

  .star:hover,
  .star.active { color: #f5a623; }
  .star:hover  { transform: scale(1.15); }

  /* Shared textarea + input */
  .panel-textarea,
  .panel-text-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e0dfd9;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    color: #1a1a1a;
    background: #fafaf8;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .panel-textarea {
    resize: none;
    min-height: 72px;
    line-height: 1.5;
  }

  .panel-text-input { height: 42px; }

  .panel-textarea:focus,
  .panel-text-input:focus { border-color: #1a1a1a; background: #fff; }

  .panel-textarea::placeholder,
  .panel-text-input::placeholder { color: #bbb; }

  .panel-submit {
    height: 38px;
    padding: 0 20px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .panel-submit:hover  { background: #333; }
  .panel-submit:active { transform: scale(0.97); }
  .panel-submit:disabled { background: #ccc; cursor: not-allowed; }

  .panel-thanks {
    font-size: 14px;
    color: #2d6a4f;
    font-weight: 500;
    display: none;
    padding: 4px 0;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- Chat -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-icon">📦</div>
      <div class="chat-header-text">
        <h2>The Bigger Box</h2>
        <p>Your thinking partner</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="welcome-message">
        <strong>Welcome.</strong>
        What would you like to think through today?
      </div>
    </div>

    <div class="panels-bar" id="panelsBar">
      <button class="panels-dismiss" id="panelsDismiss" title="Close">×</button>

      <!-- Feedback panel -->
      <div class="panel" id="feedbackPanel">
        <div class="panel-label">How was this conversation?</div>
        <div class="star-row" id="starRow">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <textarea
          class="panel-textarea"
          id="feedbackComment"
          placeholder="Anything you'd like to tell us? (optional)"
        ></textarea>
        <button class="panel-submit" id="feedbackSubmit">Send feedback</button>
        <div class="panel-thanks" id="feedbackThanks">Thanks — that helps a lot. ✓</div>
      </div>

      <!-- Topic suggestion panel -->
      <div class="panel" id="topicPanel">
        <div class="panel-label">Suggest a topic</div>
        <input
          type="text"
          class="panel-text-input"
          id="topicInput"
          placeholder="What topic would you like to explore next?"
        />
        <button class="panel-submit" id="topicSubmit">Send suggestion</button>
        <div class="panel-thanks" id="topicThanks">Received — we read every suggestion. ✓</div>
      </div>

    </div>

    <div class="chat-input-area">
      <textarea
        class="chat-input"
        id="userInput"
        placeholder="Type your question…"
        rows="1"
      ></textarea>
      <button class="send-button" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  // ── Configuration ──────────────────────────────────────────────
  const CHAT_WEBHOOK     = 'https://hook.eu2.make.com/ja9pmqhut1awqprizvlh67wtxnpomeet';
  const FEEDBACK_WEBHOOK = 'https://hook.eu2.make.com/4r84wqrmpyihtw6hehfgbbtx0hxs2tnf';
  const TOPIC_WEBHOOK    = 'https://hook.eu2.make.com/eab7jaaqd9eqs8l5tbnxnnv8mw2oo4sy';
  // ──────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  let history = [];
  let panelsShown = false;
  let turnCount = 0;

  // ── Chat ────────────────────────────────────────────────────────

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    wrapper.id = 'typing';
    wrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function showError(msg) {
    const el = document.createElement('div');
    el.className = 'error-message';
    el.textContent = msg;
    messagesEl.appendChild(el);
    scrollToBottom();
    setTimeout(() => el.remove(), 6000);
  }

  function revealPanels() {
    if (panelsShown) return;
    panelsShown = true;
    document.getElementById('panelsBar').classList.add('visible');
  }

  document.getElementById('panelsDismiss').addEventListener('click', () => {
    document.getElementById('panelsBar').classList.remove('visible');
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const welcome = messagesEl.querySelector('.welcome-message');
    if (welcome) welcome.remove();

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(CHAT_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: JSON.stringify(history) })
      });

      removeTyping();

      if (!res.ok) {
        const errText = await res.text();
        console.error('Webhook error:', res.status, errText);
        throw new Error(`Status ${res.status}`);
      }

      const reply = (await res.text()).trim() || 'No response received.';

      addMessage('assistant', reply);
      history.push({ role: 'assistant', content: reply });
      turnCount++;
      if (turnCount >= 10) revealPanels();

    } catch (err) {
      removeTyping();
      showError('Something went wrong. Please try again.');
      console.error(err);
      history.pop();
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // ── Stars ────────────────────────────────────────────────────────

  let selectedStars = 0;
  const stars = document.querySelectorAll('.star');

  stars.forEach(star => {
    star.addEventListener('mouseover', () => highlightStars(+star.dataset.value));
    star.addEventListener('mouseout',  () => highlightStars(selectedStars));
    star.addEventListener('click', () => {
      selectedStars = +star.dataset.value;
      highlightStars(selectedStars);
    });
  });

  function highlightStars(n) {
    stars.forEach(s => s.classList.toggle('active', +s.dataset.value <= n));
  }

  // ── Feedback submit ──────────────────────────────────────────────

  document.getElementById('feedbackSubmit').addEventListener('click', async () => {
    const btn     = document.getElementById('feedbackSubmit');
    const thanks  = document.getElementById('feedbackThanks');
    const comment = document.getElementById('feedbackComment').value.trim();

    if (!selectedStars) { highlightStars(0); return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      await fetch(FEEDBACK_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          stars: selectedStars,
          comment: comment || '',
          timestamp: new Date().toISOString()
        })
      });
    } catch (e) {
      console.error('Feedback send failed:', e);
    }

    document.getElementById('feedbackComment').style.display = 'none';
    document.getElementById('starRow').style.display = 'none';
    btn.style.display = 'none';
    thanks.style.display = 'block';
    setTimeout(() => document.getElementById('panelsBar').classList.remove('visible'), 2000);
  });

  // ── Topic submit ─────────────────────────────────────────────────

  document.getElementById('topicSubmit').addEventListener('click', async () => {
    const btn       = document.getElementById('topicSubmit');
    const thanks    = document.getElementById('topicThanks');
    const inputField = document.getElementById('topicInput');
    const suggestion = inputField.value.trim();

    if (!suggestion) { inputField.focus(); return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      await fetch(TOPIC_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          suggestion: suggestion,
          timestamp: new Date().toISOString()
        })
      });
    } catch (e) {
      console.error('Topic send failed:', e);
    }

    inputField.style.display = 'none';
    btn.style.display = 'none';
    thanks.style.display = 'block';
    setTimeout(() => document.getElementById('panelsBar').classList.remove('visible'), 2000);
  });
</script>

</body>
</html>
